<!DOCTYPE html>
<html>

    <head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>{{ if .IsPage }}{{ .Title }} &#8211; {{ end }}{{ .Site.Title }}</title>

        <script>
         (function() {
             var key = "theme";
             var theme = "light";
             try {
                 var stored = localStorage.getItem(key);
                 if (stored === "light" || stored === "dark") {
                     theme = stored;
                 } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
                     theme = "dark";
                 }
             } catch (_err) {}
             document.documentElement.setAttribute("data-theme", theme);
         })();
        </script>

	<link rel="stylesheet" href="/css/styles.css">

	{{ partial "header.html" }}

</head>

    <body>

    <div class="container">

        {{ partial "nav.html" . }}

        {{ block "top" . }}{{ end }}

      <article>

        {{ block "main" . }}{{ end }}

      </article>

      {{ block "footer" . }}{{ partial "footer.html" . }}{{ end }}

    </div>

</body>

<script>
 (function() {
     var key = "theme";
     var root = document.documentElement;
     var toggle = document.getElementById("theme-toggle");
     if (!toggle) {
         return;
     }

     var darkIcon = '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M10 7C10 10.866 13.134 14 17 14C18.9584 14 20.729 13.1957 21.9995 11.8995C22 11.933 22 11.9665 22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C12.0335 2 12.067 2 12.1005 2.00049C10.8043 3.27098 10 5.04157 10 7ZM4 12C4 16.4183 7.58172 20 12 20C15.0583 20 17.7158 18.2839 19.062 15.7621C18.3945 15.9187 17.7035 16 17 16C12.0294 16 8 11.9706 8 7C8 6.29648 8.08133 5.60547 8.2379 4.938C5.71611 6.28423 4 8.9417 4 12Z"/></svg>';
     var lightIcon = '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 18C8.68629 18 6 15.3137 6 12C6 8.68629 8.68629 6 12 6C15.3137 6 18 8.68629 18 12C18 15.3137 15.3137 18 12 18ZM12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16ZM11 1H13V4H11V1ZM11 20H13V23H11V20ZM3.51472 4.92893L4.92893 3.51472L7.05025 5.63604L5.63604 7.05025L3.51472 4.92893ZM16.9497 18.364L18.364 16.9497L20.4853 19.0711L19.0711 20.4853L16.9497 18.364ZM19.0711 3.51472L20.4853 4.92893L18.364 7.05025L16.9497 5.63604L19.0711 3.51472ZM5.63604 16.9497L7.05025 18.364L4.92893 20.4853L3.51472 19.0711L5.63604 16.9497ZM23 11V13H20V11H23ZM4 11V13H1V11H4Z"/></svg>';
     var iconSlot = toggle.querySelector(".theme-toggle__icon");
     var media = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;

     var getStoredTheme = function() {
         try {
             return localStorage.getItem(key);
         } catch (_err) {
             return null;
         }
     };

     var setStoredTheme = function(theme) {
         try {
             localStorage.setItem(key, theme);
         } catch (_err) {}
     };

     var resolveTheme = function() {
         var stored = getStoredTheme();
         if (stored === "light" || stored === "dark") {
             return stored;
         }
         if (media && media.matches) {
             return "dark";
         }
         return "light";
     };

     var render = function(theme) {
         root.setAttribute("data-theme", theme);
         toggle.setAttribute("aria-pressed", String(theme === "dark"));
         toggle.setAttribute("title", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
         if (iconSlot) {
             iconSlot.innerHTML = theme === "dark" ? darkIcon : lightIcon;
         }
     };

     render(resolveTheme());

     toggle.addEventListener("click", function() {
         var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
         setStoredTheme(next);
         render(next);
     });

     var syncWithSystem = function() {
         var stored = getStoredTheme();
         if (stored === "light" || stored === "dark") {
             return;
         }
         render(resolveTheme());
     };

     if (media) {
         if (typeof media.addEventListener === "function") {
             media.addEventListener("change", syncWithSystem);
         } else if (typeof media.addListener === "function") {
             media.addListener(syncWithSystem);
         }
     }
 })();
</script>

</html>

<nav class="site-nav" aria-label="Main navigation">
  <div class="site-nav__inner">
    <div class="site-nav__left">
      <a class="site-nav__brand" href="/">{{ .Site.Title }}</a>
      {{ if and .IsPage (or (eq .Section "post") (eq .Section "blog")) }}
        <span class="site-nav__crumb-separator" aria-hidden="true">/</span>
        <a class="site-nav__crumb" href="/#writing">Writing</a>
      {{ else if and (or .IsSection .IsPage) (eq .Section "above-the-parapet") }}
        <span class="site-nav__crumb-separator" aria-hidden="true">/</span>
        <a class="site-nav__crumb" href="/above-the-parapet/">Above the parapet</a>
      {{ end }}
    </div>
    <div class="site-nav__right">
      <ul class="site-nav__links">
        <li><a href="/about/">About</a></li>
      </ul>
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        aria-label="Toggle dark mode"
        aria-pressed="false"
        title="Toggle dark mode">
        <span class="icon theme-toggle__icon" style="width: 20px;"></span>
      </button>
    </div>
  </div>
</nav>
